name: Fetch Portfolio Stock Data

on:
  schedule:
    # Every 2h Mon-Fri: pre-market, mid-day, after-close runs
    - cron: '0 11,13,15,17,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch portfolio stock data
        run: python .github/scripts/fetch_portfolio.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/stocks/
          git diff --cached --quiet || git commit -m "data: refresh portfolio stock cache [skip ci]"
          git pull --rebase
          git push
