name: Daily Stock Scan

on:
  schedule:
    - cron: '30 13 * * 1-5'   # 9:30 AM EST, Mon–Fri (market open)
  workflow_dispatch:            # allows manual run from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas ta

      - name: Run stock scanner
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python .github/skills/stock-scanner/scripts/stock_scanner.py
