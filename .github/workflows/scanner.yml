name: Daily Stock Scan

on:
  schedule:
    # TEST WINDOW: every 5 minutes from 7:00 AM to 7:00 PM US Eastern
    # GitHub cron is UTC. These expressions map to 11:00-23:00 UTC during EDT.
    - cron: '*/5 11-22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:            # allows manual run from GitHub Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas ta

      - name: Run stock scanner
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python .github/skills/stock-scanner/scripts/stock_scanner.py
