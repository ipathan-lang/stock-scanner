name: Daily Stock Scan

on:
  schedule:
    # Hourly during US market hours (1 PM–9 PM UTC = 9 AM–5 PM EDT) on weekdays
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: prod
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas ta

      - name: Run stock scanner
        run: python .github/skills/stock-scanner/scripts/stock_scanner.py
