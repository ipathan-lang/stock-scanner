name: Fetch Trending Stock Data

on:
  schedule:
    # Every 2h Mon-Fri (offset from portfolio fetch by 1h)
    - cron: '0 12,14,16,18,22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch trending stocks and their data
        run: python .github/scripts/fetch_trending.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/trending.json docs/data/stocks/
          git diff --cached --quiet || git commit -m "data: refresh trending stocks cache [skip ci]"
          git pull --rebase
          git push
