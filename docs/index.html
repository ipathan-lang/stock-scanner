<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliMarket — Stock Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');

    :root {
      --bg: #f3f7fb;
      --surface: rgba(255,255,255,.94);
      --border: rgba(19,43,67,.11);
      --text: #122235;
      --muted: #5f7488;
      --ink: #0f2740;
      --green: #157f63;
      --red: #c4514b;
      --yellow: #b8841a;
      --blue: #1e63d9;
      --shadow: 0 4px 18px rgba(15,39,64,.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
    }
    header h1 {
      font-size: 1rem;
      font-weight: 800;
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: -.02em;
    }
    .search-wrap { display: flex; gap: 8px; flex: 1; min-width: 220px; }
    #q {
      flex: 1;
      max-width: 180px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.875rem;
      background: rgba(255,255,255,.9);
      color: var(--text);
      text-transform: uppercase;
      outline: none;
      font-family: inherit;
    }
    #q::placeholder { text-transform: none; }
    #q:focus { border-color: rgba(30,99,217,.5); box-shadow: 0 0 0 3px rgba(30,99,217,.1); }
    button {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.9);
      color: var(--text);
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    button:hover { border-color: rgba(30,99,217,.35); color: var(--blue); }
    .btn-p {
      background: linear-gradient(135deg, #1d6ce0, #0f766e) !important;
      color: #fff !important;
      border-color: transparent !important;
    }
    .btn-p:hover { opacity: .9; }
    #ts { font-size: 0.73rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

    /* ── MARKET BAR ── */
    #market-bar {
      display: flex;
      gap: 8px;
      padding: 9px 18px;
      background: rgba(255,255,255,.84);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      align-items: center;
      scrollbar-width: none;
    }
    #market-bar::-webkit-scrollbar { display: none; }
    #mbar-label {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .mkt-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .mkt-t { font-weight: 800; color: var(--ink); }
    .mkt-p { color: var(--muted); font-size: 0.77rem; }

    /* ── MAIN ── */
    main {
      max-width: 1060px;
      margin: 0 auto;
      padding: 16px 14px 48px;
    }
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .list-header h2 { font-size: 0.88rem; font-weight: 800; color: var(--ink); }
    .list-header span { font-size: 0.75rem; color: var(--muted); }
    #stock-list { display: grid; gap: 10px; }

    /* ── STOCK CARD ── */
    .stock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 15px 16px;
      box-shadow: var(--shadow);
    }
    .stock-card.pinned {
      border-color: rgba(30,99,217,.45);
      background: linear-gradient(135deg, rgba(30,99,217,.05), rgba(255,255,255,.97));
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-id { display: flex; align-items: center; gap: 10px; }
    .rank-no {
      width: 30px; height: 30px;
      border-radius: 9px;
      background: rgba(19,43,67,.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.77rem; font-weight: 800; color: var(--ink);
      flex-shrink: 0;
    }
    .ticker-name {
      font-size: 1.03rem; font-weight: 800; color: var(--ink);
      display: flex; align-items: center; gap: 6px;
    }
    .price-row { font-size: 0.79rem; color: var(--muted); margin-top: 2px; }

    /* Signal badge */
    .badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.71rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bg { background: rgba(21,127,99,.11); color: var(--green); border: 1px solid rgba(21,127,99,.18); }
    .by { background: rgba(184,132,26,.10); color: var(--yellow); border: 1px solid rgba(184,132,26,.18); }
    .br { background: rgba(196,81,75,.10); color: var(--red); border: 1px solid rgba(196,81,75,.18); }

    /* Indicators grid */
    .indicators {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 7px;
      margin-top: 12px;
    }
    .ind-item {
      padding: 9px 11px;
      border-radius: 11px;
      background: rgba(19,43,67,.03);
      border: 1px solid rgba(19,43,67,.07);
    }
    .ind-label {
      font-size: 0.63rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
    }
    .ind-val { font-size: 0.97rem; font-weight: 800; margin-top: 3px; }

    /* Prediction */
    .pred-row {
      margin-top: 10px;
      font-size: 0.8rem;
      padding-top: 9px;
      border-top: 1px solid rgba(19,43,67,.06);
      font-weight: 600;
    }

    /* Detail toggle */
    .detail-btn {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 7px;
      margin-top: 9px;
      background: rgba(19,43,67,.05);
      border: 1px solid rgba(19,43,67,.08);
      color: var(--muted);
    }
    .detail-btn:hover { color: var(--blue); }
    .detail-body { display: none; margin-top: 10px; }
    .detail-body.open { display: block; }

    .drivers { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .dpill { font-size: 0.7rem; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .bull { background: rgba(21,127,99,.1); color: var(--green); }
    .bear { background: rgba(196,81,75,.1); color: var(--red); }

    .news-wrap { margin-top: 6px; }
    .news-item {
      font-size: 0.73rem;
      padding: 5px 0;
      border-bottom: 1px dashed rgba(19,43,67,.1);
      color: var(--muted);
      line-height: 1.45;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item b { color: var(--ink); }
    .news-item a { color: var(--blue); text-decoration: none; }
    .news-item a:hover { text-decoration: underline; }

    /* Asset badge */
    .abadge { font-size: 0.63rem; padding: 2px 7px; border-radius: 6px; font-weight: 700; }
    .a-etf    { background: rgba(30,99,217,.1); color: var(--blue); }
    .a-metal  { background: rgba(184,132,26,.1); color: var(--yellow); }
    .a-crypto { background: rgba(121,80,200,.1); color: #7950c8; }

    /* Skeleton */
    .sk {
      display: inline-block; width: 55px; height: 13px;
      background: linear-gradient(90deg, #e0e8f0 25%, #ccd8e4 50%, #e0e8f0 75%);
      background-size: 200%;
      animation: sk 1.4s ease infinite;
      border-radius: 5px;
    }
    @keyframes sk { 0%{background-position:200%} 100%{background-position:-200%} }

    .empty {
      text-align: center; padding: 48px 20px;
      color: var(--muted); font-size: 0.88rem; line-height: 1.7;
    }
    .pos { color: var(--green); font-weight: 700; }
    .neg { color: var(--red); font-weight: 700; }

    @media (max-width: 600px) {
      .indicators { grid-template-columns: repeat(3, 1fr); }
      main { padding: 12px 10px 32px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📊 IntelliMarket</h1>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="Search ticker e.g. NVDA" maxlength="12"
           onkeypress="if(event.key==='Enter') searchStock()" />
    <button class="btn-p" onclick="searchStock()">Search</button>
    <button onclick="manualRefresh()" id="refresh-btn">&#x21BB; Refresh</button>
  </div>
  <span id="ts">Loading…</span>
</header>

<div id="market-bar">
  <span id="mbar-label">Market</span>
  <div class="mkt-pill" id="mkt-SPY"><span class="mkt-t">SPY</span>&nbsp;<span class="sk"></span></div>

<main>

  </div>

</main>

<script>
// ══════════════════════════════════════════════════════════════
//  DEFAULT WATCHLIST  (edit to customise)
// ══════════════════════════════════════════════════════════════
const DEFAULT_WATCHLIST = [
  // ── Mega-cap Tech / Software
  'AAPL','MSFT','GOOGL','AMZN','NVDA','META','TSLA','ORCL','AVGO','ADBE','CRM','AMD','NFLX',
  'INTC','QCOM','TXN','MU','AMAT','LRCX','KLAC',

  // ── AI Pure-Plays & Infrastructure (2026 trending)
  'SMCI','PLTR','SOUN','AI','ARWR','ARM','MRVL','DELL','HPE','NET','SNOW','DDOG','ZS','PANW',

  // ── Chip Manufacturing / Semiconductors
  'TSM','ASML','AEHR','ONTO','WOLF','ENTG','ACLS','UCTT','FORM','SITM','MPWR',

  // ── Healthcare / Biotech / GLP-1 (2026 trending)
  'LLY','UNH','JNJ','ABBV','MRK','PFE','AMGN','BMY','GILD','REGN','VRTX',
  'ISRG','MDT','SYK','ELV','CVS','HCA','DXCM','INCY','MRNA',

  // ── Finance / Fintech
  'JPM','V','MA','BAC','WFC','GS','MS','AXP','PYPL','SQ','COF','BRK-B',

  // ── Consumer / Retail
  'WMT','COST','HD','PG','NKE','MCD','SBUX','TGT','AMZN',

  // ── Energy / Clean Energy
  'XOM','CVX','NEE','ENPH','FSLR','CEG',

  // ── ETFs / Macro / Thematic (2026 trending)
  'SPY','QQQ','IWM','XLK','XLF','XLE','XLV','XLY','GLD','TLT',
  'SOXX','SMH','AIQ','ROBO','ARKG','IBB','HACK','CIBR','VGT','QQQM'
];

const MARKET_TICKERS = ['SPY','QQQ','IWM','XLK','XLF'];

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
const S = {
  watchlist    : [],
  data         : {},
  pinnedTicker : null,
  busy         : false
};

// ══════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════
function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function sortStocks(list) {
  return [...list].sort((a, b) =>
    (b.sortScore  ?? -9999) - (a.sortScore  ?? -9999) ||
    (b.netScore   ??  -999) - (a.netScore   ??  -999) ||
    (b.bullishScore ?? 0)   - (a.bullishScore ?? 0)   ||
    (a.bearishScore ?? 0)   - (b.bearishScore ?? 0)
  );
}

function saveWatchlist() {
  try { localStorage.setItem('sm_watch', JSON.stringify(S.watchlist)); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  TECHNICAL CALCULATIONS
// ══════════════════════════════════════════════════════════════
function rsi(closes, period = 14) {
  if (closes.length < period + 1) return 50;
  let g = 0, l = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) g += d; else l -= d;
  }
  let ag = g / period, al = l / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    ag = (ag * (period - 1) + Math.max(d, 0)) / period;
    al = (al * (period - 1) + Math.max(-d, 0)) / period;
  }
  return al === 0 ? 100 : 100 - 100 / (1 + ag / al);
}

function emaArr(data, period) {
  if (data.length < period) return new Array(data.length).fill(null);
  const k = 2 / (period + 1);
  const out = new Array(period - 1).fill(null);
  out.push(data.slice(0, period).reduce((a, b) => a + b) / period);
  for (let i = period; i < data.length; i++)
    out.push(data[i] * k + out[out.length - 1] * (1 - k));
  return out;
}

function lastEma(data, period) {
  const a = emaArr(data, period);
  return a[a.length - 1];
}

function calcMacd(closes) {
  const e12   = emaArr(closes, 12);
  const e26   = emaArr(closes, 26);
  const line  = closes.map((_, i) => e12[i] != null && e26[i] != null ? e12[i] - e26[i] : null);
  const valid = line.filter(v => v != null);
  const sig   = emaArr(valid, 9);
  const m = valid[valid.length - 1] ?? 0;
  const s = sig[sig.length - 1]     ?? 0;
  return { diff: m - s };
}

function calcIndicators(closes, highs, lows) {
  if (!closes || closes.length < 26) return null;
  const price = closes[closes.length - 1];
  const r     = rsi(closes);
  const mc    = calcMacd(closes);
  const ema20 = lastEma(closes, 20);
  const wLow  = Math.min(...lows.slice(-5));
  const wHigh = Math.max(...highs.slice(-5));
  const pos   = wHigh === wLow ? 0.5 : (price - wLow) / (wHigh - wLow);

  let bullishScore = 0;
  const bullishDrivers = [];

  if (pos < 0.4)                     { bullishScore += 2; bullishDrivers.push('Lower half of weekly range'); }
  if (r > 35 && r < 60)              { bullishScore += 2; bullishDrivers.push('RSI in healthy recovery zone'); }
  if (mc.diff > 0 && mc.diff > 0.5)  { bullishScore += 2; bullishDrivers.push('MACD above signal with momentum'); }
  if (price >= ema20 * 0.99)         { bullishScore += 2; bullishDrivers.push('Holding EMA20 support'); }
  if (pos < 0.30)                    { bullishScore += 1; bullishDrivers.push('Near recent support pocket'); }
  if (r > 40 && r < 55)             { bullishScore += 1; bullishDrivers.push('Momentum balanced, not overheated'); }

  return { bullishScore, bullishDrivers, rsi: r, macdDiff: mc.diff, ema20, position: pos, price };
}

// ══════════════════════════════════════════════════════════════
//  SIGNAL & PREDICTION
// ══════════════════════════════════════════════════════════════
function signal(d) {
  if (!d || d.err) return { label: '—', cls: 'by' };
  const s = d.netScore;
  if (s >= 7 && d.macdDiff > 0) return { label: 'Strong Bullish', cls: 'bg' };
  if (s >= 5)                    return { label: 'Bullish',         cls: 'bg' };
  if (s >= 2)                    return { label: 'Balanced',        cls: 'by' };
  if (s >= 0)                    return { label: 'Cautious',        cls: 'by' };
  if (s >= -3)                   return { label: 'Weak',            cls: 'br' };
  return                                { label: 'Bearish',         cls: 'br' };
}

function prediction(d) {
  if (!d || d.err) return { text: '—', color: 'var(--muted)' };
  const s = d.netScore;
  if (s >= 7)  return { text: 'Upside setup is dominant',      color: 'var(--green)' };
  if (s >= 5)  return { text: 'Bias remains positive',          color: 'var(--green)' };
  if (s >= 2)  return { text: 'Balanced — wait for a trigger',  color: 'var(--muted)' };
  if (s >= 0)  return { text: 'Downside risk is building',      color: 'var(--red)'   };
  if (s >= -3) return { text: 'Weak setup — avoid entry',       color: 'var(--red)'   };
  return              { text: 'Bearish pressure is dominant',   color: 'var(--red)'   };
}

function detectAssetType(ticker) {
  const etfs   = ['SPY','QQQ','IWM','XLK','XLF','XLE','XLV','XLY','XLP','VTI','VOO','IVV',
                  'AGG','BND','VXUS','TLT','GLD','SLV','IAU','SOXX','SMH','AIQ','ROBO',
                  'ARKG','IBB','HACK','CIBR','VGT','QQQM'];
  const metals = ['GDX','GDXJ','COPX','USO','UNG'];
  if (etfs.includes(ticker))    return 'ETF';
  if (metals.includes(ticker))  return 'Metal';
  if (ticker.includes('-USD'))  return 'Crypto';
  return 'Stock';
}

// ══════════════════════════════════════════════════════════════
//  FETCH  (direct + CORS proxy fallback)
// ══════════════════════════════════════════════════════════════
async function fetchJ(url) {
  const u  = url + `&_t=${Date.now()}`;
  const TO = AbortSignal.timeout ? AbortSignal.timeout(9000) : undefined;

  try {
    const r = await fetch(u, { cache: 'no-store', mode: 'cors', signal: TO });
    if (r.ok) return await r.json();
  } catch(e) {}

  const proxies = [
    v => `https://api.allorigins.win/raw?url=${encodeURIComponent(v)}`,
    v => `https://corsproxy.io/?${encodeURIComponent(v)}`,
    v => `https://proxy.cors.sh/${v}`
  ];
  for (const p of proxies) {
    try {
      const sig = AbortSignal.timeout ? AbortSignal.timeout(12000) : undefined;
      const r   = await fetch(p(u), { cache: 'no-store', signal: sig });
      if (!r.ok) continue;
      const text = await r.text();
      if (text.trim().startsWith('<')) continue;
      return JSON.parse(text);
    } catch(e) { continue; }
  }
  throw new Error('All fetch attempts failed for ' + url);
}

async function fetchStock(ticker) {
  const chartUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=60d&includePrePost=false`;
  const newsUrl  = `https://query2.finance.yahoo.com/v1/finance/search?q=${ticker}&newsCount=3`;

  const [chart, news] = await Promise.all([
    fetchJ(chartUrl),
    fetchJ(newsUrl).catch(() => null)
  ]);

  const res = chart.chart?.result?.[0];
  if (!res) throw new Error('No chart data for ' + ticker);

  const meta = res.meta;
  const q    = res.indicators.quote[0];

  const valid = [];
  for (let i = 0; i < q.close.length; i++)
    if (q.close[i] != null && q.high[i] != null && q.low[i] != null)
      valid.push({ c: q.close[i], h: q.high[i], l: q.low[i] });

  const closes    = valid.map(v => v.c);
  const highs     = valid.map(v => v.h);
  const lows      = valid.map(v => v.l);
  const price     = meta.regularMarketPrice ?? closes[closes.length - 1];
  const prevClose = meta.previousClose ?? meta.chartPreviousClose ?? closes[closes.length - 2] ?? price;
  const change    = price - prevClose;
  const changePct = (change / prevClose) * 100;

  const ind = calcIndicators(closes, highs, lows) || {
    bullishScore: 0, bullishDrivers: [], rsi: 50, macdDiff: 0, ema20: price, position: 0.5, price
  };

  // ── Bearish scoring ──
  let bearishScore = 0;
  const bearishDrivers = [];
  if (ind.position > 0.70)       { bearishScore += 2; bearishDrivers.push('Near top of weekly range'); }
  if (ind.rsi >= 65)             { bearishScore += 2; bearishDrivers.push('RSI overheated — pullback risk'); }
  if (ind.macdDiff < 0)          { bearishScore += 2; bearishDrivers.push('MACD below signal line'); }
  if (price < ind.ema20 * 0.99)  { bearishScore += 2; bearishDrivers.push('Below EMA20 trend support'); }
  if (changePct <= -1)           { bearishScore += 1; bearishDrivers.push('Daily downside pressure'); }
  if (changePct <= -3)           { bearishScore += 2; bearishDrivers.push('Strong daily decline'); }
  if (changePct <= -5)           { bearishScore += 2; bearishDrivers.push('Major selloff warning'); }

  // ── Catalyst scoring ──
  let catalystScore = 0;
  const catalystDrivers = [];
  if (changePct >= 2) { catalystScore += 1; catalystDrivers.push('Fresh buyers entering today'); }
  if (changePct >= 4) { catalystScore += 1; catalystDrivers.push('Strong daily rally momentum'); }

  const netScore   = ind.bullishScore + catalystScore - bearishScore;
  const conviction = clamp(Math.round(((netScore + 9) / 22) * 100), 0, 100);
  const sortScore  = netScore * 100 + ind.bullishScore * 10 - bearishScore;

  const headlines = [];
  if (news?.news) {
    news.news.slice(0, 3).forEach(n => {
      if (n.title) headlines.push({ title: n.title, link: n.link, publisher: n.publisher });
    });
  }

  return {
    ticker, price, change, changePct,
    assetType: detectAssetType(ticker),
    ...ind, bearishScore, bearishDrivers,
    catalystScore, catalystDrivers,
    netScore, conviction, sortScore, headlines
  };
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════
function renderMarketBar() {
  MARKET_TICKERS.forEach(t => {
    const el = document.getElementById('mkt-' + t);
    if (!el) return;
    const d = S.data[t];
    if (!d || d.err) {
      el.innerHTML = `<span class="mkt-t">${t}</span>&nbsp;<span class="sk"></span>`;
      return;
    }
    const sig = signal(d);
    const cs  = d.changePct >= 0 ? '+' : '';
    const cls = d.changePct >= 0 ? 'pos' : 'neg';
    el.innerHTML = `
      <span class="mkt-t">${t}</span>
      <span class="mkt-p">$${d.price.toFixed(2)}</span>
      <span class="${cls}">${cs}${d.changePct.toFixed(2)}%</span>
      <span class="badge ${sig.cls}">${sig.label}</span>
    `;
  });
}

function renderList() {
  const el      = document.getElementById('stock-list');
  const countEl = document.getElementById('count-label');
  if (!el) return;

  const all    = S.watchlist.map(t => S.data[t]).filter(d => d && !d.err);
  const sorted = sortStocks(all);

  if (countEl) {
    const total   = S.watchlist.length;
    const loaded  = all.length;
    countEl.textContent = loaded < total ? `${loaded} / ${total} loaded…` : `${loaded} stocks`;
  }

  if (!sorted.length) {
    const loading = S.watchlist.some(t => !S.data[t]);
    el.innerHTML = loading
      ? S.watchlist.slice(0, 12).map((t, i) => skeletonCard(t, i + 1)).join('')
      : `<div class="empty">No stock data available.<br>Check your connection and try refreshing.</div>`;
    return;
  }

  let html = '';

  // Pinned (searched) stock at top
  if (S.pinnedTicker && S.data[S.pinnedTicker] && !S.data[S.pinnedTicker].err) {
    html += buildCard(S.data[S.pinnedTicker], 0, true);
  }

  sorted
    .filter(d => d.ticker !== S.pinnedTicker)
    .forEach((d, i) => { html += buildCard(d, i + 1, false); });

  el.innerHTML = html;
}

function skeletonCard(ticker, rank) {
  return `
    <div class="stock-card">
      <div class="card-head">
        <div class="card-id">
          <div class="rank-no">#${rank}</div>
          <div>
            <div class="ticker-name">${ticker}</div>
            <div class="price-row"><span class="sk"></span></div>
          </div>
        </div>
        <span class="sk" style="width:80px;height:22px;border-radius:8px"></span>
      </div>
      <div class="indicators" style="margin-top:12px">
        ${[...Array(8)].map(() =>
          `<div class="ind-item">
            <div class="sk" style="width:42px;margin-bottom:5px"></div>
            <div class="sk" style="width:52px;height:17px"></div>
          </div>`).join('')}
      </div>
    </div>`;
}

function buildCard(d, rank, pinned) {
  const sig  = signal(d);
  const pred = prediction(d);
  const cs   = d.changePct >= 0 ? '+' : '';
  const cc   = d.changePct >= 0 ? 'pos' : 'neg';

  const atBadge = d.assetType !== 'Stock'
    ? `<span class="abadge a-${d.assetType.toLowerCase()}">${d.assetType}</span>`
    : '';

  // Colour-code each indicator value
  const netColor  = d.netScore >= 5 ? 'var(--green)' : d.netScore < 0 ? 'var(--red)' : 'var(--ink)';
  const rsiColor  = d.rsi > 70 ? 'var(--red)' : d.rsi < 30 ? 'var(--green)' : 'var(--ink)';
  const macdColor = d.macdDiff >= 0 ? 'var(--green)' : 'var(--red)';
  const convColor = d.conviction >= 65 ? 'var(--green)' : d.conviction < 40 ? 'var(--red)' : 'var(--ink)';
  const wkColor   = d.position < 0.35 ? 'var(--green)' : d.position > 0.70 ? 'var(--red)' : 'var(--ink)';
  const emaColor  = d.price >= d.ema20 ? 'var(--green)' : 'var(--red)';
  const bbColor   = d.bullishScore > d.bearishScore ? 'var(--green)'
                  : d.bearishScore > d.bullishScore  ? 'var(--red)' : 'var(--ink)';

  const bullPills = (d.bullishDrivers || []).map(x =>
    `<span class="dpill bull">${esc(x)}</span>`).join('');
  const bearPills = (d.bearishDrivers || []).map(x =>
    `<span class="dpill bear">${esc(x)}</span>`).join('');

  const newsHtml = d.headlines?.length
    ? d.headlines.map(h =>
        `<div class="news-item"><b>${esc(h.publisher || 'News')}:</b> ` +
        (h.link
          ? `<a href="${esc(h.link)}" target="_blank" rel="noopener noreferrer">${esc(h.title)}</a>`
          : esc(h.title)) +
        `</div>`).join('')
    : `<div class="news-item">No recent headlines</div>`;

  const detailId = `d-${d.ticker}`;
  const rankHtml = pinned
    ? `<span style="font-size:1.1rem">&#128204;</span>`
    : `<div class="rank-no">#${rank}</div>`;

  return `
    <div class="stock-card${pinned ? ' pinned' : ''}">
      <div class="card-head">
        <div class="card-id">
          ${rankHtml}
          <div>
            <div class="ticker-name">${esc(d.ticker)}${atBadge}</div>
            <div class="price-row">
              $${d.price.toFixed(2)}&nbsp;&nbsp;
              <span class="${cc}">${cs}${d.changePct.toFixed(2)}%</span>
              &nbsp;<span style="color:var(--muted)">(${d.change >= 0 ? '+' : ''}$${d.change.toFixed(2)})</span>
            </div>
          </div>
        </div>
        <span class="badge ${sig.cls}">${sig.label}</span>
      </div>

      <div class="indicators">
        <div class="ind-item">
          <div class="ind-label">Net Score</div>
          <div class="ind-val" style="color:${netColor}">${d.netScore}</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">RSI (14)</div>
          <div class="ind-val" style="color:${rsiColor}">${d.rsi.toFixed(1)}</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">Conviction</div>
          <div class="ind-val" style="color:${convColor}">${d.conviction}%</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">MACD Diff</div>
          <div class="ind-val" style="color:${macdColor}">${d.macdDiff >= 0 ? '+' : ''}${d.macdDiff.toFixed(3)}</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">EMA 20</div>
          <div class="ind-val" style="color:${emaColor}">$${d.ema20.toFixed(2)}</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">Wk Position</div>
          <div class="ind-val" style="color:${wkColor}">${(d.position * 100).toFixed(0)}%</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">Bull / Bear</div>
          <div class="ind-val" style="color:${bbColor}">${d.bullishScore} / ${d.bearishScore}</div>
        </div>
        <div class="ind-item">
          <div class="ind-label">Day Change</div>
          <div class="ind-val" style="color:${d.changePct >= 0 ? 'var(--green)' : 'var(--red)'}">${cs}${d.changePct.toFixed(2)}%</div>
        </div>
      </div>

      <div class="pred-row" style="color:${pred.color}">&#9670; ${pred.text}</div>

      <div>
        <button class="detail-btn" onclick="toggleDetail('${detailId}')">&#9660; Details &amp; News</button>
        <div class="detail-body" id="${detailId}">
          ${bullPills || bearPills ? `<div class="drivers">${bullPills}${bearPills}</div>` : ''}
          <div class="news-wrap">${newsHtml}</div>
        </div>
      </div>
    </div>`;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  const btn = el.previousElementSibling;
  if (btn) btn.innerHTML = el.classList.contains('open')
    ? '&#9650; Details &amp; News'
    : '&#9660; Details &amp; News';
}

// ══════════════════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════════════════
async function loadOne(ticker) {
  try {
    S.data[ticker] = await fetchStock(ticker);
  } catch(e) {
    S.data[ticker] = { err: true, ticker };
  }
}

async function refreshAll() {
  if (S.busy) return;
  S.busy = true;

  const refreshBtn = document.getElementById('refresh-btn');
  if (refreshBtn) refreshBtn.disabled = true;
  document.getElementById('ts').textContent = 'Refreshing…';

  // Market bar first (fast, parallel)
  await Promise.all(MARKET_TICKERS.map(t => loadOne(t)));
  renderMarketBar();

  // Watchlist in batches of 6 to avoid API rate limits
  const tickers = [...new Set(S.watchlist)].filter(t => !MARKET_TICKERS.includes(t));
  if (S.pinnedTicker && !tickers.includes(S.pinnedTicker)) tickers.unshift(S.pinnedTicker);

  for (let i = 0; i < tickers.length; i += 6) {
    await Promise.all(tickers.slice(i, i + 6).map(t => loadOne(t)));
    renderList();
    renderMarketBar();
  }

  S.busy = false;
  if (refreshBtn) refreshBtn.disabled = false;
  document.getElementById('ts').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  renderList();
}

async function manualRefresh() {
  S.data = {};
  await refreshAll();
}

async function searchStock() {
  const input  = document.getElementById('q');
  const ticker = (input.value || '').trim().toUpperCase().replace(/[^A-Z0-9.\-]/g, '');
  if (!ticker) return;
  input.value = '';

  if (!S.watchlist.includes(ticker)) {
    S.watchlist.push(ticker);
    saveWatchlist();
  }

  S.pinnedTicker = ticker;
  renderList();
  document.getElementById('ts').textContent = `Loading ${ticker}…`;

  await loadOne(ticker);
  renderList();
  renderMarketBar();
  document.getElementById('ts').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
(async () => {
  try {
    const saved = localStorage.getItem('sm_watch');
    S.watchlist = saved ? JSON.parse(saved) : [...DEFAULT_WATCHLIST];
  } catch(e) {
    S.watchlist = [...DEFAULT_WATCHLIST];
  }

  await refreshAll();

  // Auto-refresh every 5 min when tab is visible
  setInterval(() => { if (!document.hidden && !S.busy) refreshAll(); }, 5 * 60 * 1000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !S.busy) refreshAll();
  });
})();
</script>
